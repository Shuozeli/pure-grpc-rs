<!DOCTYPE html>
<html>
<head><title>WebTransport Echo Test</title></head>
<body>
<h1>WebTransport Echo Test</h1>
<div id="status">Connecting...</div>
<div id="results"></div>
<script>
const status = document.getElementById('status');
const results = document.getElementById('results');

function log(msg) {
    const p = document.createElement('p');
    p.textContent = msg;
    results.appendChild(p);
    console.log(msg);
}

// The server injects the cert hash at serve time.
const CERT_HASH_B64 = '{{CERT_HASH_B64}}';

async function run() {
    try {
        const url = `https://${location.hostname}:${location.port}/wt`;
        log(`Connecting to ${url}`);

        // Decode the base64 cert hash to a Uint8Array.
        const hashBytes = Uint8Array.from(atob(CERT_HASH_B64), c => c.charCodeAt(0));
        log(`Cert hash: ${CERT_HASH_B64} (${hashBytes.length} bytes)`);

        const transport = new WebTransport(url, {
            serverCertificateHashes: [{
                algorithm: 'sha-256',
                value: hashBytes.buffer,
            }],
        });
        await transport.ready;
        status.textContent = 'Connected!';
        log('WebTransport session ready');

        // Open a bidi stream.
        const stream = await transport.createBidirectionalStream();
        const writer = stream.writable.getWriter();
        const reader = stream.readable.getReader();

        // Send test messages.
        const messages = ['hello', 'world', 'grpc-h3'];
        for (const msg of messages) {
            const encoded = new TextEncoder().encode(msg);
            await writer.write(encoded);
            log(`Sent: ${msg}`);
        }
        await writer.close();

        // Read echoed responses.
        const received = [];
        while (true) {
            const { value, done } = await reader.read();
            if (done) break;
            const decoded = new TextDecoder().decode(value);
            received.push(decoded);
            log(`Received: ${decoded}`);
        }

        // Verify.
        const expected = messages.map(m => `echo:${m}`);
        const pass = JSON.stringify(received) === JSON.stringify(expected);
        status.textContent = pass ? 'PASS' : `FAIL (got: ${JSON.stringify(received)})`;
        log(pass ? 'TEST PASSED' : `TEST FAILED: expected ${JSON.stringify(expected)}, got ${JSON.stringify(received)}`);

        // Set a data attribute for headless Chrome to read.
        document.body.dataset.testResult = pass ? 'PASS' : 'FAIL';

        transport.close();
    } catch (err) {
        status.textContent = `Error: ${err}`;
        log(`Error: ${err}`);
        document.body.dataset.testResult = 'FAIL';
    }
}

run();
</script>
</body>
</html>
